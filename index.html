<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="stylee.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-ybEjZ2R6i3RJY1gZ6ZKw1qH/z7cF0oV6p1DwV1NLXvIhqL2aXotTx3GdrYnP1oc8TRaSgWvwOwYd6U4n1t5oWg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>

<body>
    <div class="container">
        <!-- welcome div -->
        <div id="welcomeDiv" class="hidden absolute right-5">
            <div
                class="bg-[#03a84e] flex flex-col justify-between shadow-lg overflow-hidden rounded-2xl w-[500px] h-[578px]">
                <div class="flex flex-col items-center space-y-3 pt-4 px-6">
                    <img src="/assets/bird.png" class="w-8 h-8" alt="">
                    <h2 class="text-3xl text-center text-white font-semibold">Welcome to tawk.to</h2>
                    <p class="text-lg text-white">Search our KB or start a chat. We're here to help 24x7.</p>
                    <div id="chatBtn"
                        class="bg-white cursor-pointer text-black h-20 rounded-xl flex px-4 justify-between items-center w-full">
                        <div>
                            <h2 class="text-lg font-bold">New Conversation</h2>
                            <p class="text-sm text-gray-500">We typically reply in a few minutes</p>
                        </div>
                        <button class=" cursor-pointer">
                            <img src="/assets/send.png" alt="">
                        </button>
                    </div>
                    <!-- help center -->
                    <div class="bg-white text-black h-32 rounded-xl py-4 px-4 space-y-2 w-full">
                        <h2 class="text-lg font-bold">Help Center</h2>
                        <div class="relative">
                            <input
                                class="appearance-none border pl-10 border-gray-300 hover:border-gray-400 transition-colors rounded-md w-full py-4 px-3 text-gray-800 leading-tight focus:outline-none focus:ring-green-600 focus:border-green-600 focus:shadow-outline placeholder:text-sm placeholder:text-gray-800"
                                type="text" placeholder="Search KB for answer" />
                            <div class="absolute left-0 inset-y-0 flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg"
                                    class="h-5 w-5 ml-3 text-gray-400 hover:text-gray-500" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-white h-12 flex justify-around px-10 py-3 rounded-b-xl">
                    <!-- welcome page button -->
                    <button class="cursor-pointer" id="welcomeBtn">
                        <img src="/assets/home.png" alt="">
                    </button>
                    <!-- message page button -->
                    <button class="cursor-pointer" id="messageBtn">
                        <img src="/assets/message.png" alt="">
                    </button>
                </div>
            </div>
        </div>


        <!-- message page -->
        <div id="messageDiv" class=" hidden absolute right-5">
            <div class="w-[500px] h-[578px] flex flex-col bg-white rounded-2xl shadow-lg overflow-hidden ">
                <!-- Header -->
                <div class="bg-green-600 text-white flex items-center gap-8 px-4 py-3">
                    <button class="text-xl cursor-pointer" id="backBtn"><img src="/assets/left-arrow.png"
                            class="w-3 h-3" alt=""></button>
                    <h2 class="text-xl font-semibold text-white">Messages</h2>
                </div>

                <!-- Content Area -->
                <div class="flex-1 p-4 space-y-4">
                    <h2 class="text-xl text-black font-semibold">Start a new chat</h2>
                    <div id="chatBtn2"
                        class="bg-white border text-black h-20 rounded-xl flex px-4 justify-between items-center w-full cursor-pointer">
                        <div>
                            <h2 class="text-lg font-bold">New Conversation</h2>
                            <p class="text-sm text-gray-500">We typically reply in a few minutes</p>
                        </div>
                        <button class="cursor-pointer">
                            <img src="/assets/send.png" alt="">
                        </button>
                    </div>
                    <h2 class="text-xl text-black font-semibold">Recent</h2>
                    <div>
                        <p class="text-base text-gray-500 text-center">No recent conversations</p>
                    </div>
                </div>
                <div class="bg-white h-12 relative shadow-2xl flex justify-around px-10 py-3 rounded-b-xl">
                    <button class="cursor-pointer" id="welcomeBtn2">
                        <img src="/assets/home.png" alt="">
                    </button>
                    <button class="cursor-pointer" id="messageBtn2">
                        <img src="/assets/message.png" alt="">
                    </button>
                </div>
            </div>
        </div>
        <!-- chat form -->
        <div id="chatDiv" class="hidden absolute right-5">
            <div class="w-[500px] h-[578px] flex flex-col bg-white rounded-2xl shadow-lg overflow-hidden">

                <!-- Header -->
                <div class="bg-green-600 text-white flex justify-between items-center px-4 py-3">
                    <button class="text-xl cursor-pointer" id="chatBackBtn">
                        <img src="/assets/left-arrow.png" class="w-3 h-3" alt="">
                    </button>
                    <button class="text-xl">&#9776;</button>
                </div>

                <!-- Chat Messages -->
                <div id="messages" class=" overflow-y-auto border border-gray-200 p-4 space-y-2"></div>

                <!-- Input Area -->
                <div class="flex items-center transition-shadow duration-300  px-4 py-2">
                    <input id="messageInput" type="text" placeholder="Type a message..."
                        class="flex-1 px-3 py-2 rounded-lg  focus:outline-none" />
                    <div class="flex space-x-3 ml-2 text-gray-500 text-lg">
                        <button class="text-xl"><img src="/assets/like.png" class="w-4 h-4" alt=""></button>
                        <button class="text-xl"><img src="/assets/link.png" class="w-4 h-4" alt=""></button>
                        <button class="text-xl"><img src="/assets/happy.png" class="w-4 h-4" alt=""></button>
                        <button id="sendBtn" class="text-xl cursor-pointer">
                            <img src="/assets/send.png" class="w-4 h-4" alt="">
                        </button>
                    </div>
                </div>

            </div>
        </div>
        <!-- div  -->
        <!-- open chat button -->
        <!-- Open chat button -->
        <div class="fixed bottom-0 right-0 m-2">
            <button id="openChatBtn" class="bg-green-600 p-4 rounded-full transition duration-300">
                <img id="chatIcon" src="/assets/speech.png" alt="Open chat" class="w-6 h-6" />
            </button>
        </div>

    </div>
    <script src="script.js"></script>
    <!-- Socket.IO Client -->
    <script src="api.js"></script>
    <script src="chat.js"></script>

</body>


</html>
